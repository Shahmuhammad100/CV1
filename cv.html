<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CV</title>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

/* NAVBAR */

nav{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.05);
border-bottom:1px solid rgba(255,255,255,0.1);
z-index:999;
}

.logo{
font-size:22px;
font-weight:700;
color:#38bdf8;
}

nav ul{
display:flex;
gap:25px;
list-style:none;
}

nav a{
text-decoration:none;
color:white;
transition:.3s;
}

nav a:hover{
color:#38bdf8;
}

/* HERO */

.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.hero h1{
font-size:52px;
}

.hero span{
color:#38bdf8;
}

.typing{
font-size:22px;
margin-top:10px;
color:#cbd5e1;
}

.btn{
margin-top:25px;
padding:12px 28px;
border:none;
border-radius:10px;
background:#38bdf8;
color:black;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* SECTIONS */

section{
padding:80px 8%;
}

.section-title{
font-size:32px;
margin-bottom:30px;
color:#38bdf8;
}

/* ABOUT */

.about{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
align-items:center;
}

.about img{
width:100%;
border-radius:20px;
}

/* SKILLS */

.skills{
display:flex;
flex-wrap:wrap;
gap:15px;
}

.skill{
padding:10px 20px;
background:#020617;
border:1px solid rgba(255,255,255,0.1);
border-radius:10px;
}

/* PROJECTS */

.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#020617;
padding:25px;
border-radius:15px;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
}

.card a{
display:inline-block;
margin-top:10px;
color:#38bdf8;
text-decoration:none;
}

/* CONTACT */

.contact{
text-align:center;
}

footer{
text-align:center;
padding:20px;
border-top:1px solid rgba(255,255,255,0.1);
margin-top:40px;
color:#94a3b8;
}

/* MOBILE */

@media(max-width:768px){

.hero h1{
font-size:36px;
}

.about{
grid-template-columns:1fr;
}

nav ul{
display:none;
}

}

</style>
</head>

<body>
<!-- NAVBAR -->

<nav>
<div class="logo">Shah Muhammad</div>

<ul>
<li><a href="#about">About</a></li>
<li><a href="#projects">Projects</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>
<img src="CV.jpg" height="520px" width="100%">

<footer>
© 2026 Shah Muhammad — All Rights Reserved
</footer>
</body>
</html>
